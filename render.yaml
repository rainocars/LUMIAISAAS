services:
  - type: web
        plan: free
        name: lumi-ai-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        value: mongodb+srv://lumii:lumi2025@cluster0.mongodb.net/lumi_ai?retryWrites=true&w=majority
      - key: DB_NAME
        value: lumi_ai
      - key: EMERGENT_LLM_KEY
        value: mock_key
      - key: RESEND_API_KEY
        sync: false
      - key: SENDER_EMAIL
        value: onboarding@resend.dev
      - key: LUPUS_ADMIN_EMAIL
        value: admin@lupus.ai
      - key: ADMIN_PASSWORD
        value: lumi2025
      - key: CORS_ORIGINS
        value: https://lumi-ai-labs-ten.vercel.app

services:
  - type: web
    name: lumi-ai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: lumi_ai
      - key: EMERGENT_LLM_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: SENDER_EMAIL
        value: onboarding@resend.dev
      - key: LUPUS_ADMIN_EMAIL
        value: admin@lupus.ai
      - key: ADMIN_PASSWORD
        value: lumi2025
      - key: CORS_ORIGINS
        value: https://lumi-ai-labs-ten.vercel.app
